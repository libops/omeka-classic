---
x-common: &common
  restart: unless-stopped
  networks:
    default:

networks:
  default:

volumes:
  acme-data: {}
  mariadb-data: {}
  omeka-classic-files: {}

secrets:
  DB_ROOT_PASSWORD:
    file: ./secrets/DB_ROOT_PASSWORD
  OMEKA_CLASSIC_DB_PASSWORD:
    file: ./secrets/OMEKA_CLASSIC_DB_PASSWORD
  OMEKA_CLASSIC_ADMIN_PASSWORD:
    file: ./secrets/OMEKA_CLASSIC_ADMIN_PASSWORD

services:
  init:
    image: libops/base:3.2.2.0@sha256:cd6bf8e69165ce839ea4f926e07ea597630ea1d385358fbd7fbcd21ae42c8997
    restart: no
    volumes:
      - ./secrets:/secrets:rw
      - ./scripts:/scripts:ro
      - ./docker-compose.yaml:/docker-compose.yaml:ro
    command: /scripts/generate-secrets.sh
    profiles: [none]

  traefik:
    <<: *common
    image: traefik:v3.6.13@sha256:34d5089d0b414945342848518b383f11f5b3a645504ed87b77ffeb9d683d0e48
    command:
      - --providers.file.filename=/etc/traefik/dynamic/omeka-classic.yml
      - --providers.file.watch=true
      - --entrypoints.web.address=:80
      - --entrypoints.web.transport.respondingTimeouts.readTimeout=300s
    environment:
      DOMAIN: "${DOMAIN:-localhost}"
      URI_SCHEME: "${URI_SCHEME:-http}"
    ports:
      - "80:80"
    volumes:
      - ./conf/traefik/omeka-classic.tmpl:/etc/traefik/dynamic/omeka-classic.yml:ro
    depends_on:
      omeka-classic:
        condition: service_healthy

  omeka-classic:
    <<: *common
    image: libops/omeka-classic:nginx-1.30.3-php84
    build:
      context: .
      args:
        BASE_IMAGE: libops/omeka-classic:nginx-1.30.3-php84
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DOMAIN: "${DOMAIN:-localhost}"
      LIBOPS_SMTP_HOST: "${LIBOPS_SMTP_HOST:-host.docker.internal}"
      LIBOPS_SMTP_PORT: "${LIBOPS_SMTP_PORT:-25}"
      SMTP_FROM: "${SMTP_FROM:-}"
      OMEKA_CLASSIC_ENABLE_HTTPS: "false"
    secrets:
      - source: DB_ROOT_PASSWORD
      - source: OMEKA_CLASSIC_DB_PASSWORD
        target: DB_PASSWORD
      - source: OMEKA_CLASSIC_ADMIN_PASSWORD
    volumes:
      - omeka-classic-files:/var/www/omeka-classic/files:rw
    depends_on:
      mariadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  mariadb:
    <<: *common
    image: libops/mariadb:11@sha256:df935aa57a4444a1bd9024afdf8b3d78abfdfa2c4662320badd099fa6193de6b
    volumes:
      - mariadb-data:/var/lib/mysql:rw
    secrets:
      - source: DB_ROOT_PASSWORD
